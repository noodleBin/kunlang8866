# # Map
# pcdmap_version: 0.0.1  
# pcdmap_path: /century/loc_map/ndt_map
# init_map_path: /century/loc_map/ndt_map

# xuzhou test
# mercator_origin_x: 528124.48
# mercator_origin_y: 3799636.97

# qingdao
mercator_origin_x: 250932.85
mercator_origin_y: 3987498.59

# MSF, RTK, INS
loc_type: INS

# # init
# loc_init_mode: 2  # MANUAL = 0, INS = 1, MIX = 2
# init_position:
#     use_fix_init_point : false
#     fix_point_x : -12.0913
#     fix_point_y : 7.46202
#     fix_point_z : 1.98594

# sensor topic
left_lidar_topic: "/lidar/helios/front_left"
right_lidar_topic: "/lidar/helios/rear_right"
left_lidar_trans_topic: "/century/transform/left_lidar"
right_lidar_trans_topic: "/century/transform/right_lidar"
chassis_topic: "/century/canbus/chassis"
loc_topic: "/century/loc/pose" 

# ins topic
ins_pva_topic: "/century/sensor/gnss/insx"
ins_imu_topic: "/century/sensor/gnss/imu"
ins_corrimu_topic: "/century/sensor/gnss/corrected_imu"
ins_bestpose_topic: "/century/sensor/gnss/best_pose"

#msf output topic
msf_loc_topic: "/century/loc/fusion_pose"
lidar_loc_topic: "/century/loc/lidar_pose"
msf_reset_topic: "/century/loc/msf_reset"

# calibration file
ins_calib_file: "/century/vehicle_config/calib/ins_calib.yaml"
lidar_calib_file: "/century/vehicle_config/calib/lidar_calib.yaml"

# map
ndt_map_path: "/century/data/ndt_map"

error_state_kalman_filter:
    earth:
        # gravity can be calculated from https://www.sensorsone.com/local-gravity-calculator/ using latitude and height:
        gravity_magnitude: 9.80943
        # rotation speed, rad/s:
        rotation_speed: 7.292115e-5
        # latitude:
        latitude:   48.9827703173 # 48.9827703173 #  48.9825914868 
    covariance:
        prior:
            pos: 1.0e-6  # 1.0e-6
            vel: 1.0e-6  # 1.0e-6
            ori: 1.0e-6  # 1.0e-6
            epsilon: 1.0e-6 # 1.0e-6
            delta: 1.0e-6   # 1.0e-6
        process:
            gyro: 1.0e-4   # 1.0e-4
            accel: 2.5e-3  # 2.5e-3
            bias_accel: 2.5e-3  # 2.5e-3
            bias_gyro: 1.0e-4  # 1.0e-4
        measurement:
            pose:
                pos: 1.0e-4     # 1.0e-4
                ori: 1.0e-4     # 1.0e-4
            pos: 1.0e-4         # 1.0e-4
            vel: 2.5e-3         # 2.5e-3
    motion_constraint: 
        activated: true
        w_b_thresh: 0.13

# multi sensor fusion
use_ins_pose: false
use_ins_velocity: true
use_chassis_velocity: false
syntax = "proto2";

package century.monitor;

import "modules/common/proto/header.proto";

// Status summary. The value order is important, because when we summarize,
// larger value will overwrite smaller value:
//    FATAL > ERROR > WARN > OK > UNKNOWN
message ComponentStatus {
  enum Status {
    UNKNOWN = 0;
    OK = 1;
    WARN = 2;
    ERROR = 3;
    FATAL = 4;
  }
  optional Status status = 1 [default = UNKNOWN];
  optional string message = 2;
}

message Component {
  // A summary of all detailed status.
  optional ComponentStatus summary = 1;

  // Detailed status.
  optional ComponentStatus process_status = 2;
  optional ComponentStatus channel_status = 3;
  optional ComponentStatus resource_status = 4;
  optional ComponentStatus other_status = 5;
  optional ComponentStatus module_status = 6;
}

message SystemStatus {
  optional century.common.Header header = 1;

  map<string, ComponentStatus> hmi_modules = 7;
  map<string, Component> components = 8;

  // Some critical message for passengers. HMI should highlight it or even read
  // loudly.
  optional string passenger_msg = 4;

  // If we have this field, safety_mode should be triggered.
  // We'll check the system action and driver action continuously. If no proper
  // action was taken in a specified period of time (such as 10 seconds), EStop
  // will be sent to bring the vehicle into emergency full stop.
  optional double safety_mode_trigger_time = 5;
  optional bool require_emergency_stop = 6;

  // In simulation mode, the monitor will publish message with this field set,
  // so subscribers could identify it from the recorded messages.
  optional bool is_realtime_in_simulation = 9;

  // In some modes, other processes besides modules and monitored components may
  // need to be monitored
  map<string, ComponentStatus> other_components = 10;

  reserved 2, 3;
}

// added for fault data begin
message FaultData {
  optional int32 domain_type = 1;  // 3 PERC(aarch); 4 PNC(x86)
  optional string code = 2;
  optional int32 level = 3;        // 1 Prompt info; 2 Warning; 3 Common fault; 4 Fatal fault
  optional string code_msg = 4;
  optional int32 module_type = 5; // defined in  /century/modules/common/configs/common_def.h
}

message SystemData{
  optional float cpu_usage = 1;
  optional float mem_usage = 2;
  optional float mem_free = 3;
  optional float mem_buf = 4;
  optional float mem_cache = 5;
  optional float disk_usage = 6;
  optional float io_usage = 7;
}

message OtaPackageData{
  optional string software_version = 1;
  optional string monitor_software_version = 2;
  optional string map_file = 3;
  optional string base_map = 4;
  optional string sim_map = 5;
  optional string routing_map = 6;
}

message SystemMonitorData {
  optional SystemData system_data = 1;
  optional OtaPackageData ota_package_data = 2;
}

message RunningStatus {
  // true:on autodriving status;  false: not autodriving status
  optional bool auto_driving_status = 1 [default = false];

  // 0 LANEFOLLOW;  1 OPENSPACE
  optional int32 trajectory_scenario = 2 [default = 0];
}

message MonitoredData {
  optional century.common.Header header = 1;
  optional int32 domain_type = 2; // 3 PERC(aarch); 4 PNC(x86)
  repeated FaultData fault_data = 3;
  optional SystemMonitorData system_monitor_data = 4;
  
  // Some states of the vehicle during operation
  optional RunningStatus running_status = 5;

}
// added for fault data end

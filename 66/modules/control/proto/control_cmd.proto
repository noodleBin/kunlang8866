enum ControlState {
  DEFAULT = 0;            // default
  EMERGENCY_STOP = 1;     // for laser
  POSE_LOSSED = 2;        // waiting topic
  TRAJECTORY_LOSSED = 3;  // waiting topic
  TRAJECTORY_ERROR = 4;   // waiting topic
  GUARD = 5;
  NEAREST_POINT_NOT_FIND = 6;
  TARGET_ACHIEVE = 7;
  FEEDBACK_CONTROL = 8;
  DESIRE_SPEED_TOO_LOW = 9;
  SLOPE_START = 10;
  DOWNHILL_START = 11;
  SYSTEM_ERROR = 12;
  CHASSIS_ERROR = 13;
  ESTOP = 14;
  LOCALIZATION_NOT_OK = 15;
  MONITOR_LEVEL1 = 16;
  MONITOR_LEVEL2 = 17;
  MINIMUM_DISTANCE_OVERSHOOT = 18;
  LOCATION_POOR_OVERTIME = 19;
  TRAJECTORY_POINT_ANOMALY = 20;
};

enum MonitorState {
  DEFAULT_MONITOR = 0;  // default
  INFO_MONITOR = 1;
  WARNING_MONITOR = 2;
  EMERGENCY_LEVEL_3 = 3;  //
  EMERGENCY_LEVEL_4 = 4;  //
};


message LatencyStats {
optional double total_time_ms = 1 ;
repeated double controller_time_ms = 2 ;
optional bool total_time_exceeded = 3 ;
}

enum RemoteTakeoverCause {
  REMOTE_TAKEOVER_NO_REQUEST = 0;
  REMOTE_TAKEOVER_VEHICLE_SHAKING = 1;
};
enum ControlBrakeScenario {
  CONTROL_BRAKE_NORMAL = 0;
  CONTROL_BRAKE_ABNORMAL_INPUT = 1;
  CONTROL_BRAKE_DEVIATION_TRAJECTORY = 2;
  CONTROL_BRAKE_FALLBACK_TRAJECTORY = 3;
  CONTROL_BRAKE_LOCATION_POOR = 4;
};

enum ControlSteeringMode {
  STEERINGMODE_FIGURE_EIGHT  = 0;
  STEERINGMODE_DIAGONAL  = 1;
  STEERINGMODE_FRONT_HALF_FIGURE_EIGHT  = 2;
  STEERINGMODE_REAR_HALF_FIGURE_EIGHT  = 3;

};
// next id : 51
message ControlCommand {
optional century.common.Header header = 1 ;

// target engine torque request in N*M
optional double target_torque_2axis = 3 ;
optional double target_torque_3axis = 4 ;

// target non-directional steering rate, in percentage of full scale per
// second [0, 100]
optional double aeb_enable = 5 ;
optional double steering_rate = 6 ;

// target steering angle, in percentage of full scale [-100, 100]
optional double steering_target = 7 ;

// parking brake engage. true: engaged
optional bool parking_brake = 8 ;

optional double velocity_compensation_coefficient = 9 ;

  // target acceleration in m`s^-2
  optional double acceleration = 10;

  // model reset
  optional bool reset_model = 16 [deprecated = true];
  // engine on/off, true: engine on
  optional bool engine_on_off = 17;
  // completion percentage of trajectory planned in last cycle
  optional double trajectory_fraction = 18;
  optional century.canbus.Chassis.DrivingMode driving_mode = 19
      [deprecated = true];
  optional century.canbus.Chassis.GearPosition gear_location = 20;

  optional Debug debug = 22;
  optional century.common.VehicleSignal signal = 23;

   // target throttle in percentage [0, 100]
  optional double throttle = 24;

  // target brake in percentage [0, 100]
  optional double brake = 25;

  optional century.common.EngageAdvice engage_advice = 26;
  optional bool is_in_safe_mode = 27 [default = false];

  // deprecated fields
  optional bool left_turn = 13 [deprecated = true];
  optional bool right_turn = 14 [deprecated = true];
  optional bool high_beam = 11 [deprecated = true];
  optional bool low_beam = 12 [deprecated = true];
  optional bool horn = 15 [deprecated = true];
  optional TurnSignal turnsignal = 21 [deprecated = true];

  optional uint32 guide1_left_light = 28;
  optional uint32 guide1_right_light = 29;
  optional uint32 guide1_Horn = 30;
  optional uint32 guide1_estop = 31;
  optional uint32 guide1_driving_light = 32;

  //marker lights
  optional uint32 guide1_clearance_light = 33;

  //state 
  optional uint32 guide1_navigation_standby_mode = 34 [default = 0];

  // high-voltage power switch
  optional uint32 HVC = 35;

  // navigate error reset flag
  optional uint32 guide1_reset = 36;

  //low power cosumption mode 
  optional uint32 lowpower_mode = 37;

  //equivalent target steering wheels angle in aixs 1;
  optional double target_steering_angle_1axis = 38;

  //equivalent target steering wheels angle in aixs 4;
  optional double target_steering_angle_4axis = 39;

  // target brake in percentage [0, 100]

  optional uint32 guide1_brake = 40;
 
optional LatencyStats latency_stats = 41 ;
optional PadMessage pad_msg =42 ;
/*
//set out request mode ,0 in volecity 1 in torque, 2 in position mode
  optional century.canbus.Chassis.WalkingMode guide1_xingzou_mode= 43;

  //gear popsition ,0 parking,1 reverse, 2 neutral, 3 drive
  optional century.canbus.Chassis.GearPosition guide1_gear = 44;
*/
//flash light
optional uint32 guide1_double_flash = 45 ;
// target speed, in m/s
optional double speed = 46;

optional bool waiting_steering_flag = 47 [default = false] ;

optional ControlState control_state = 48 [default = DEFAULT];
optional MonitorState monitor_state = 49 [default = DEFAULT_MONITOR];
optional MonitorState monitor_aarch_state = 50 [default = DEFAULT_MONITOR];

optional uint32 guide1_voice_num = 51 [default = 0];
optional uint32 guide1_voice_volue = 52 [default = 0];

optional uint32 guide1_f_low_beam_light = 53 [default = 0];
optional uint32 guide1_f_lhigh_beam_light = 54 [default = 0];
optional uint32 guide1_r_low_beam_light = 55 [default = 0];
optional uint32 guide1_r_high_beam_light = 56 [default = 0];
optional uint32 guide1_fog_light = 57 [default = 0];
optional uint32 guide1_unload_lamp = 58 [default = 0];
optional uint32 guide1_loading_lamp = 59 [default = 0];
optional uint32 guide1_loaded_lamp = 60 [default = 0];

optional VoiceBroadcastScenario voice_broadcast_scenario = 61 [default = VOICE_BROADCAST_NOT_REQUIRED];

optional ControlSteeringMode guide1_zhuanxiang_mode = 62 [default = STEERINGMODE_FIGURE_EIGHT];

optional bool manual_click_brake_enable = 63 [default = false];

}


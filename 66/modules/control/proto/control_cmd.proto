  VOICE_BROADCAST_UNLOADING_REQUEST = 10;
  VOICE_BROADCAST_PASS_REQUEST = 11;
  VOICE_BROADCAST_POWER_ALARM = 12;
  VOICE_BROADCAST_PRESSURE_REQUEST = 13;
  VOICE_BROADCAST_OBSTACLE_STOP = 14;
  VOICE_BROADCAST_OBSTACLE_COLLISION = 15;

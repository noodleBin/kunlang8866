syntax = "proto2";
package century.drivers;

import "modules/common/proto/header.proto";

message PointXYZIRT {
  optional float x = 1 [default = nan];
  optional float y = 2 [default = nan];
  optional float z = 3 [default = nan];
  optional uint32 intensity = 4 [default = 0];
  optional uint32 ring = 5 [default = 0];
  optional double timestamp = 6 [default = 0];
}

message PointXYZIRTCloud {
  optional century.common.Header header = 1;
  optional string frame_id = 2;
  optional bool is_dense = 3;
  repeated PointXYZIRT point = 4;
  optional double measuretime = 5;
  optional uint32 width = 6;
  optional uint32 height = 7;
}

message PointCloudPacked {
  optional century.common.Header header = 1;
  optional string frame_id = 2;
  optional bool is_dense = 3;
  optional double measuretime = 4;
  optional uint32 width = 5;
  optional uint32 height = 6;
  optional uint32 point_size = 7;
  optional bytes data = 8;
}

message PointXYZIT {
  optional float x = 1 [default = nan];
  optional float y = 2 [default = nan];
  optional float z = 3 [default = nan];
  optional uint32 intensity = 4 [default = 0];
  optional uint64 timestamp = 5 [default = 0];
}

message PointCloud {
  optional century.common.Header header = 1;
  optional string frame_id = 2;
  optional bool is_dense = 3;
  repeated PointXYZIT point = 4;
  optional double measurement_time = 5;
  optional uint32 width = 6;
  optional uint32 height = 7;
}

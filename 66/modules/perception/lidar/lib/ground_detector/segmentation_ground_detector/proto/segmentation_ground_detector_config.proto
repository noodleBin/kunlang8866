syntax = "proto2";

package century.perception.lidar;

message SegmentationGroundDetectorConfig {
  optional float near_range = 1 [default = 8.0];
  optional float near_grid_size = 2 [default = 0.12];
  optional float far_grid_size = 3 [default = 0.30];
  optional float weak_obstacle_threshold = 4 [default = 0.08];
  optional float strong_obstacle_threshold = 5 [default = 0.18];
  optional float far_obstacle_threshold = 6 [default = 0.20];
  optional int32 neighbor_cell_radius = 7 [default = 1];
  optional int32 plane_min_cells = 8 [default = 4];
  optional float plane_max_residual = 9 [default = 0.08];
  optional float local_gradient_threshold = 10 [default = 0.03];
  optional float gradient_adaptive_scale = 11 [default = 0.5];
  optional float roughness_adaptive_scale = 12 [default = 1.0];
  optional float adaptive_threshold_cap = 13 [default = 0.06];
  optional int32 weak_cluster_min_cells = 14 [default = 3];
  optional float weak_cluster_min_peak = 15 [default = 0.10];
  optional float x_min = 16 [default = -80.0];
  optional float x_max = 17 [default = 80.0];
  optional float y_min = 18 [default = -80.0];
  optional float y_max = 19 [default = 80.0];
  optional float z_min = 20 [default = -5.0];
  optional float z_max = 21 [default = 5.0];
  optional bool enable_debug_log = 22 [default = false];
  // Maximum vertical offset (meters) by which fitted ground_z may exceed the
  // cell's minimum observed z.  Prevents overestimation on slopes/ramps.
  optional float max_ground_z_offset = 23 [default = 0.25];
  optional float roughness_gradient_ratio = 24 [default = 0.5];
}

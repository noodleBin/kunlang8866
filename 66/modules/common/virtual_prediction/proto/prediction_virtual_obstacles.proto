syntax = "proto2";

package century.prediction;

import "modules/common/proto/geometry.proto";
import "modules/perception/proto/perception_obstacle.proto";

message PredictionVirtualObstaclesConf {
  optional int32 id = 1 [default = 1];
  optional bool is_static = 2 [default = true];
  optional double velocity = 3 [default = 0.5];
  optional double acc = 4 [default = 0.0];
  optional century.common.Point3D start_point = 5;
  optional century.common.Point3D end_point = 6;
  optional century.common.Point3D bbox_size = 7;
  optional century.perception.PerceptionObstacle.Type obstacle_type = 8;
  optional double distance_condition = 9;
  optional century.common.Point3D position_condition = 10;
}

message PredictionVirtualObstaclesVec {
  optional string prediction_topic = 1 [default = "/century/prediction"];
  optional string localization_topic = 2 [default = "/century/localization/pose"];
  repeated PredictionVirtualObstaclesConf mock_obstacles = 3;
}


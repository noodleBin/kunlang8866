syntax = "proto2";

package century.planning;

import "modules/canbus/proto/chassis.proto";
import "modules/common/proto/drive_state.proto";
import "modules/common/proto/geometry.proto";
import "modules/common/proto/header.proto";
import "modules/common/proto/pnc_point.proto";
import "modules/map/proto/map_id.proto";
import "modules/map/proto/map_lane.proto";
import "modules/planning/proto/decision.proto";
import "modules/planning/proto/planning_internal.proto";
import "modules/planning/proto/pass_stacker_request.proto";

message EStop {
  // is_estop == true when emergency stop is required
  optional bool is_estop = 1;
  optional string reason = 2;
}

message TaskStats {
  optional string name = 1;
  optional double time_ms = 2;
}

message LatencyStats {
  optional double total_time_ms = 1;
  repeated TaskStats task_stats = 2;
  optional double init_frame_time_ms = 3;
}

enum HonkingScenario
{
  NO_HONKING = 0;
  JUNCTION = 1;
  DRIVEOFF = 2;
  REACHE_DESTINATION = 3;
  TUNING = 4 ;
  PEDESTRAN = 5;
}
message HonkingStatus {
  optional bool need_honking = 1;
  optional HonkingScenario scenario = 2;
}

enum DisplayType {
  DEFAULT_DIS = 0;
  DRIVEOFF_DIS = 1;
  VEHICLE_STOPED = 2;
  TURN_LEFT = 3;  
  TURN_RIGHT = 4;
  U_TURN = 5;  

  DIAGNAL_LEFT = 7;
  DIAGNAL_RIGHT = 8;
  OBSTACAL_FRONT = 9;
  STOP_FOR_OBSTACLE = 10;
  REACHED_DESTINATION = 14;
  WAITING_LOAD = 15;
  REQUIER_PASS = 16;
  COLLISION = 17;
  MANUAL = 18;
  REMOTE_DRIVE = 19;
  LOW_SOC_WARNING = 20;
  LOW_TIRE_PRESSURE = 21;
  HIGH_TIRE_PRESSURE = 22;
  WAITING_UNLOAD = 23;
  REVERCE_DRIVE = 24;
  CROSS_DIAGNAL = 25;
  STOP_FOR_VEHICLE = 26;
  STOP_FOR_PEDESTRIAN = 27;
  DANGER_STAY_AWAY = 28;
  BACKGROUND_MUSIC = 100;
  BACKGROUND_MUSIC_02 = 101;
  BACKGROUND_MUSIC_03 = 102;
  BACKGROUND_MUSIC_04 = 103;
  BACKGROUND_MUSIC_05 = 104;
  BACKGROUND_MUSIC_06 = 105;
  BACKGROUND_MUSIC_07 = 106;
  BACKGROUND_MUSIC_08 = 107;
  BACKGROUND_MUSIC_09 = 108;
  BACKGROUND_MUSIC_10 = 109;
}

enum JucType {
  UNKNOWN = 0;
  IN_ROAD = 1;
  CROSS_ROAD = 2;
  FORK_ROAD = 3;
  MAIN_SIDE = 4;
  DEAD_END = 5;
}

message RSSInfo {
  optional bool is_rss_safe = 1;
  optional double cur_dist_lon = 2;
  optional double rss_safe_dist_lon = 3;
  optional double acc_lon_range_minimum = 4;
  optional double acc_lon_range_maximum = 5;
  optional double acc_lat_left_range_minimum = 6;
  optional double acc_lat_left_range_maximum = 7;
  optional double acc_lat_right_range_minimum = 8;
  optional double acc_lat_right_range_maximum = 9;
}

// next id: 24
message ADCTrajectory {
  optional century.common.Header header = 1;

  optional double total_path_length = 2;  // in meters

  optional double total_path_time = 3;  // in seconds

  // to determine whether the planning module has reached the routing
  // destination
  optional bool has_reached_destination = 4 [default = false];

  // to determine whether the planning module has reached the routing
  // station
  optional bool has_reached_station = 5 [default = false];

  optional EStop estop = 6;

  optional DisplayType display_type = 7;

  optional century.planning_internal.Debug debug = 8;

  // is_replan == true mean replan triggered
  optional bool is_replan = 9 [default = false];

  // Specify trajectory gear
  optional century.canbus.Chassis.GearPosition gear = 10;

  optional bool background_music_enable = 11;

  // path data + speed data
  repeated century.common.TrajectoryPoint trajectory_point = 12;

  // path point without speed info
  repeated century.common.PathPoint path_point = 13;

  optional century.planning.DecisionResult decision = 14;

  optional LatencyStats latency_stats = 15;

  // the routing used for current planning result
  optional century.common.Header routing_header = 16;
  enum RightOfWayStatus {
    UNPROTECTED = 0;
    PROTECTED = 1;
  }
  optional RightOfWayStatus right_of_way_status = 17;

  // lane id along current reference line
  repeated century.hdmap.Id lane_id = 18;

  // set the engage advice for based on current planning result.
  optional century.common.EngageAdvice engage_advice = 19;

  // the region where planning cares most
  message CriticalRegion {
    repeated century.common.Polygon region = 1;
  }
  // critical region will be empty when planning is NOT sure which region is
  // critical
  // critical regions may or may not overlap
  optional CriticalRegion critical_region = 20;

  enum TrajectoryType {
    UNKNOWN = 0;
    NORMAL = 1;
    PATH_FALLBACK = 2;
    SPEED_FALLBACK = 3;
    PATH_REUSED = 4;
  }
  optional TrajectoryType trajectory_type = 21 [default = UNKNOWN];

  optional string replan_reason = 22;

  // lane id along target reference line
  repeated century.hdmap.Id target_lane_id = 23;

  // complete dead end flag
  optional bool car_in_dead_end = 24;

  // if request remote , REMOTE_PUB_AVOID_OBS is reversed
  enum RemoteScenario {
    REMOTE_PUB_UNKNOWN = 0;
    REMOTE_PUB_PARK_IN = 1;
    REMOTE_PUB_PARK_OUT = 2;
    REMOTE_PUB_UTURN = 3;
    REMOTE_PUB_AVOID_OBS = 4;
    REMOTE_PUB_TRAFFIC_LIGHT_UNKNOWN = 5;
    REMOTE_PUB_STOP_LONG = 6;
    REMOTE_PUB_TEB_MORE_FAILED = 7;
    REMOTE_PUB_TEB_STOP_LONG = 8;
    REMOTE_GATE_BLOCK = 9;
  }

  message RemotePub {
    // pub remote_status when needed
    optional bool is_enabled = 1 [default = false];
    optional RemoteScenario remote_scenario = 2 [default = REMOTE_PUB_UNKNOWN];
  }
  optional RemotePub remote_status = 25;

  enum TrajectoryScenario {
    LANEFOLLOW = 0;
    OPENSPACE = 1;
  }
  optional TrajectoryScenario trajectory_scenario = 26 [default = LANEFOLLOW];

  // AD behavior
  enum ADBehavior {
    AD_NONE = 0;
    AD_TURNING_LEFT = 1;
    AD_TURNING_RIGHT = 2;
    AD_BRAKING = 3;
    AD_PARKING = 4;
    AD_REVERSING = 5;
  }
  optional ADBehavior ad_behavior = 27 [default = AD_NONE];

  optional century.hdmap.Lane.LaneType map_area_type = 28;
  optional bool adc_in_lane = 29 [default = false];

  message P2pDistance {
    optional double total = 1;
    optional double remain = 2;
  }
  optional P2pDistance p2p_distance = 30;

  enum LaneStatus {
    HAS_NO_LOCATION_MESSAGE = 0;
    FOLLOW_LANE_DIRECTION = 1;
    OPPOSITE_LANE_DIRECTION = 2;
    OUTSIDE_LANE = 3;
  }
  optional LaneStatus lane_status = 31 [default = HAS_NO_LOCATION_MESSAGE];
  optional bool is_mixed_traffic_scenario = 32 [default = false];

  enum OvertakeReportState {
    DEFAULT = 0;
    PREPARE = 1;
    TURN = 2;
    OVERTAKE = 3;
    RETURN = 4;
    HOLD = 5;
    FINISH = 6;
    FAIL = 7;
  }
  optional OvertakeReportState overtake_state = 33;

  optional bool no_green_in_junction = 34 [default = false];  // Abandoned

  enum WarningType {
    WARNING_NONE = 0;
    NO_GREEN_IN_JUNCTION = 1;
    DANGEROUS_ROAD = 2;
    RAILWAY_CROSSING = 3;
  }
  optional WarningType warning_type = 35 [default = WARNING_NONE];
  optional bool borrow_request = 36 [default = false];
  optional string block_obs_id = 37;
  optional bool need_diagonal = 38 [default = false];
  optional double diagonal_heading = 39 [default = 0.0];
  optional PassStackerRequest pass_stacker_request = 40;

  optional bool is_backward_trajectory = 41 [default = false];
  
  optional HonkingStatus honking_status = 43;
  optional PassStackerRequest notice_stacker = 44;
  optional bool enable_auto_drive = 45 [default = false];


  // output related to RSS
  optional RSSInfo rss_info = 100;
}

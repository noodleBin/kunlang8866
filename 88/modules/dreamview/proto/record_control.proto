syntax = "proto2";

package century.dreamview;

message RecordCommand {
  enum CommandType {
    START_RECORD_CURRENT = 0;
    RECORD_STATUS = 1;
  }

  optional CommandType type = 1 [default = START_RECORD_CURRENT];
  optional uint64 timestamp_ms = 2;
}

message RecordStatus {
  optional int32 status = 1 [default = 0];
  optional string error = 2;
  optional uint64 timestamp_ms = 3;
}

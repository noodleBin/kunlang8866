syntax = "proto2";

package century.perception.lidar;


message LidarTrackingNodeConfig {
  optional string output_prediction_channel_name = 1;
  optional string output_perception_channel_name = 2;
  optional string input_localization_channel_name = 3;
  optional string input_perception_detection_channel_name = 4;
  optional string perception_module_name = 5;
  optional string localization_module_name = 6;
  optional bool enable_dump_predictor = 7;
  optional bool local_ecef_frame = 8;
  optional double duplicated_distance_thres = 9;
  optional uint32 frame_wait_seconds = 10;
  optional bool dump_perception_input = 11;
  optional bool dump_prediction_output = 12;
  optional string log_path = 13;
  optional double yaw_rate_active_perception = 14;
  optional double using_point_cloud_polygon_thres = 15;
  optional double min_length_threshold = 16;
  optional double height_diff_threshold = 17;
  optional double convariance_thres = 18;
  optional double mean_shift_thres = 19;
  optional bool use_detector_pose = 20;

}
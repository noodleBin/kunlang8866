syntax = "proto2";
package century.perception.lidar;

message RangeFilterConfig {
    optional float x = 1 [default = 0.0];
    optional float y = 2 [default = 0.0];
    optional float size = 3 [default = 2.8];
    optional bool enable_filter = 4 [default = true];
}

message PointCloudPreprocessorConfig {
  optional bool filter_naninf_points = 1 [default = true];
  optional bool filter_nearby_box_points = 2 [default = false];
  optional float box_forward_x = 3 [default = 0];
  optional float box_backward_x = 4 [default = 0];
  optional float box_forward_y = 5 [default = 0];
  optional float box_backward_y = 6 [default = 0];
  optional bool filter_high_z_points = 7 [default = false];
  optional float z_threshold = 8 [default = 5.0];

  optional bool use_det = 9 [default = true];
  optional int32 lidar_ring_num = 10 [default = 32];
  optional float lidar_horizontal_resolution = 11 [default = 0.2];
  optional float roi_forward_x = 12 [default = 0.8];
  optional float roi_forward_y = 13 [default = 0.1];
  optional float roi_backward_x = 14 [default = -0.8];
  optional float roi_backward_y = 15 [default = -0.1];
  optional float range_forward_x = 16 [default = 100];
  optional float range_forward_y = 17 [default = 40];
  optional float range_backward_x = 18 [default = -25];
  optional float range_backward_y = 19 [default = -40];
  optional float range_z_max = 20 [default = 6.0];
  optional float range_z_min = 21 [default = -1.6];

  optional bool is_filter = 22 [default = true];
  optional bool is_intensity_filter = 23 [default = false];
  optional float search_radium = 24 [default = 0];
  optional int32 min_neighbors = 25 [default = 0];
  optional bool is_rectified = 26 [default = true];
  optional float grid_size = 27 [default = 0.8];
  optional int32 grid_range = 28 [default = 40];
  optional float height_threshold = 29 [default = 0.5];
  optional bool dump_pcd = 30 [default = false];

  optional float range_around_forward_x = 31 [default = 0.0];
  optional float range_around_forward_y = 32 [default = 0.0];
  optional float range_around_backward_x = 33 [default = 0.0];
  optional float range_around_backward_y = 34 [default = 0.0];

  optional float original_intensity_threshold = 35 [default = 0.0];
  optional float dust_intensity_threshold = 36 [default = 10];
  optional string ground_detector = 37;
  optional float max_intensity_threshold = 38 [default = 80];
  optional float z_offset = 39 [default = 0.0];
  repeated RangeFilterConfig range_filter_config = 40;

  optional bool filter_outlier_points = 41 [default = false];
  optional float outlier_search_radius = 42 [default = 0.5];
  optional int32 outlier_min_neighbors = 43 [default = 2];
}

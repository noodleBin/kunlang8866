syntax = "proto2";

package century.v2x.obu;

import "modules/common/proto/header.proto";
import "modules/common/proto/geometry.proto";

message ObuRsi {
  optional century.common.Header header = 1;
  optional bytes rsu_id = 2;
  optional int32 rsi_id = 3;
  optional int32 alter_type = 4;
  optional string description = 5;
  optional century.common.Point2D ref_point = 6;
  repeated century.common.Point2D points = 7;
  optional int32 radius = 8;
  optional int32 msg_cnt = 9;
}

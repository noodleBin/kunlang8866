syntax = "proto2";

package century.planning;

import "modules/planning/proto/planner_open_space_config.proto";
import "modules/planning/proto/planner_teb_config.proto";

//////////////////////////////////
// OpenSpaceFallBackDeciderConfig

message OpenSpaceFallBackDeciderConfig {
  // prediction time horizon for prediction obstacles
  optional double open_space_prediction_time_period = 1 [default = 3.0];
  // fallback collision check distance
  optional double open_space_fallback_collision_distance = 2 [default = 5.0];
  // fallback stop trajectory safety gap to obstacles
  optional double open_space_fallback_stop_distance = 3 [default = 2.0];
  // fallback collision time buffer (s)
  optional double open_space_fallback_collision_time_buffer = 4
      [default = 10.0];
}

//////////////////////////////////
// OpenSpacePreStopDeciderConfig

message OpenSpacePreStopDeciderConfig {
  // roi scenario definitions
  enum StopType {
    NOT_DEFINED = 0;
    PARKING = 1;
    PULL_OVER = 2;
    NARROW_STREET_U_TURN = 3;
    DEAD_END_PRE_STOP = 4;
  }
  optional StopType stop_type = 1;
  optional double rightaway_stop_distance = 2 [default = 2.0];  // meter
  optional double stop_distance_to_target = 3 [default = 5.0];  // second
}

//////////////////////////////////
// OpenSpaceRoiDeciderConfig

message OpenSpaceRescueConfig {
  optional bool enable_expand_neighbor_lane = 1 [default = false];

  optional double rescue_hybrid_start_distance = 10 [default = 15.0];
  optional double rescue_hybrid_end_distance = 11 [default = 30.0];
  optional double rescue_hybrid_lon_sample_interval = 12 [default = 1.5];
  optional double reach_end_point_dis_threshold = 13 [default = 5.0];
  optional double expand_boundary_offset_dis = 14 [default = 2.0];
}

message OpenSpaceRoiDeciderConfig {
  // roi scenario definitions
  enum RoiType {
    NOT_DEFINED = 0;
    PARKING = 1;
    PULL_OVER = 2;
    PARK_AND_GO = 3;
    NARROW_STREET_U_TURN = 4;
    DEAD_END = 5;
    TRAFFIC_LIGHT = 6;
    RESCUE = 7;
    UTURN = 8;
  }
  optional RoiType roi_type = 1;
  // longitudinal range of parking roi start
  optional double roi_longitudinal_range_start = 2 [default = 10.0];
  // longitudinal range of parking roi end
  optional double roi_longitudinal_range_end = 3 [default = 10.0];
  // parking spot range detection threshold
  optional double parking_start_range = 4 [default = 7.0];
  // Parking orientation for reverse parking
  optional bool parking_inwards = 5 [default = false];
  // wrap previous gflags
  optional bool enable_perception_obstacles = 6 [default = true];
  // buffer distance from vehicle's edge to parking spot end line
  optional double parking_depth_buffer = 7 [default = 0.1];
  // min angle difference to stitch a new segment in roi representation
  optional double roi_line_segment_min_angle = 8 [default = 0.15];
  optional double roi_line_segment_length = 9 [default = 1.0];
  // roi line segment length when getting road boundary from map
  optional double roi_line_segment_length_from_map = 10 [default = 10.0];
  // relative distance threshold to filter out ignored obstacle
  optional double perception_obstacle_filtering_distance = 11
      [default = 1000.0];
  // buffer distance for perception obstacle
  optional double perception_obstacle_buffer = 12;
  // tolerance limit for road_bound_width abnormal changes
  optional double curb_heading_tangent_change_upper_limit = 13 [default = 1.0];
  // end pose s distance to current vehicle
  optional double end_pose_s_distance = 14 [default = 10.0];
  // end pose x to parallel parking
  optional double parallel_park_end_x_buffer = 15 [default = 0.2];
  // extend right spot width size
  optional double extend_right_x_buffer = 16 [default = 0.0];
  // extend left spot width size
  optional double extend_left_x_buffer = 17 [default = 0.0];
  // longitudinal range of rescue roi
  optional double roi_longitudinal_rescue_range = 18 [default = 20.0];
  // expand road width for parking
  optional double road_borrow_width_for_parking = 19 [default = 20.0];
  // electric fence search radius, m
  optional double roi_electric_fence_search_radius = 20 [default = 100.0];
  // electric fence flag
  optional bool enable_electric_fence_roi = 21 [default = false];
  // roi convex hull
  optional bool enable_use_convex_hull = 22 [default = false];
  // rescue config
  optional OpenSpaceRescueConfig rescue_config = 30;
}

//////////////////////////////////
// OpenSpaceTrajectoryPartitionConfig

message OpenSpaceTrajectoryPartitionConfig {
  // Gear shift trajectory parameter
  optional double gear_shift_max_t = 1;
  optional double gear_shift_unit_t = 2;
  optional double gear_shift_period_duration = 3;
  optional uint64 interpolated_pieces_num = 4;
  optional uint64 initial_gear_check_horizon = 5;
  // @brief heading search range is the range to filter out too large
  // angle difference between vehicle heading and pathpoint heading
  optional double heading_search_range = 6;
  // @brief heading_track_range is the range to filter out too large
  // angle difference between vehicle heading and vehicle to pathpoint vector
  optional double heading_track_range = 7;
  optional double distance_search_range = 8 [default = 1.0e-6];
  // @brief IOU, intersection over union
  optional double heading_offset_to_midpoint = 9;
  optional double lateral_offset_to_midpoint = 10 [default = 0.1];
  optional double longitudinal_offset_to_midpoint = 11 [default = 0.2];
  optional double vehicle_box_iou_threshold_to_midpoint = 12 [default = 0.95];
  optional double linear_velocity_threshold_on_ego = 13 [default = 0.1];
}

//////////////////////////////////
// OpenSpaceTrajectoryProviderConfig

message OpenSpaceTrajectoryProviderConfig {
  // TODO(Jinyun) Move PlannerOpenSpaceConfig to
  // OpenSpaceTrajectoryOptimizerConfig
  optional OpenSpaceTrajectoryOptimizerConfig
      open_space_trajectory_optimizer_config = 1;
  // roi scenario definitions
  enum RoiType {
    NOT_DEFINED = 0;
    PARKING = 1;
    PULL_OVER = 2;
    PARK_AND_GO = 3;
    NARROW_STREET_U_TURN = 4;
    DEAD_END = 5;
    TRAFFIC_LIGHT = 6;
    RESCUE = 7;
    UTURN = 8;
  }
  optional RoiType roi_type = 2;
}

message OpenSpaceTrajectoryOptimizerConfig {
  // Hybrid a star warm start configs
  optional HybridAStarConfig hybrid_a_star_config = 1;
  // Dual variable configs
  optional DualVariableConfig dual_variable_warm_start_config = 2;
  // Distance approach trajectory smoothing configs
  optional DistanceApproachTrajectorySmootherConfig
      distance_approach_trajectory_smoother_config = 3;
  optional float delta_t = 4 [default = 0.5];
  optional double is_near_destination_threshold = 5 [default = 0.001];
  // (TODO:(QiL) tmp message during refactoring, deprecate when all tuning done.
  optional PlannerOpenSpaceConfig planner_open_space_config = 6;
}

// Hybrid a star as warm start for later smoothing
message HybridAStarConfig {
  optional double xy_grid_resolution = 1 [default = 0.2];
  optional double phi_grid_resolution = 2 [default = 0.05];
  optional uint64 next_node_num = 3 [default = 10];
  optional double step_size = 4 [default = 0.5];
  optional double traj_forward_penalty = 5 [default = 0.0];
  optional double traj_back_penalty = 6 [default = 0.0];
  optional double traj_gear_switch_penalty = 7 [default = 10.0];
  optional double traj_steer_penalty = 8 [default = 100.0];
  optional double traj_steer_change_penalty = 9 [default = 10.0];
  optional double traj_end_heading_error_penalty = 10 [default = 0.0];
  optional double grid_a_star_xy_resolution = 15 [default = 0.1];
  optional double node_radius = 16 [default = 0.5];
}

enum DualVariableMode {
  DUAL_VARIABLE_IPOPT = 0;
  DUAL_VARIABLE_IPOPTQP = 1;
  DUAL_VARIABLE_OSQP = 2;
  DUAL_VARIABLE_DEBUG = 3;
}

// Dual variable configs for warm starting distance approach trajectory
// smoothing
message DualVariableConfig {
  optional double weight_d = 1 [default = 1.0];
  optional IpoptSolverConfig ipopt_config = 2;
  optional DualVariableMode qp_format = 3;
  optional double min_safety_distance = 4 [default = 0.0];
  optional bool debug_osqp = 5 [default = false];
  optional double beta = 6 [default = 1.0];
}

// Distance approach trajectory smoothing configs
message DistanceApproachTrajectorySmootherConfig {
  optional double weight_steer = 1;
  optional double weight_a = 2;
  optional double weight_steer_rate = 3;
  optional double weight_a_rate = 4;
  optional double weight_x = 5;
  optional double weight_y = 6;
  optional double weight_phi = 7;
  optional double weight_v = 8;
  optional double weight_steer_stitching = 9;
  optional double weight_a_stitching = 10;
  optional double weight_first_order_time = 11;
  optional double weight_second_order_time = 12;
  optional double min_safety_distance = 13 [default = 0.0];
  optional double max_speed_forward = 14 [default = 3.0];
  optional double max_speed_reverse = 15 [default = 2.0];
  optional double max_acceleration_forward = 16 [default = 2.0];
  optional double max_acceleration_reverse = 17 [default = 2.0];
  optional double min_time_sample_scaling = 18 [default = 0.1];
  optional double max_time_sample_scaling = 19 [default = 10.0];
  optional bool use_fix_time = 20 [default = false];
  optional IpoptSolverConfig ipopt_config = 21;
  optional bool enable_constraint_check = 22;
  optional bool enable_hand_derivative = 23;
  // True to enable hand derived derivative inside open space planner
  optional bool enable_derivative_check = 24;
  // True to enable derivative check inside open space planner
  optional bool enable_initial_final_check = 25 [default = false];
}

// Ipopt configs
message IpoptSolverConfig {
  optional int32 ipopt_print_level = 1;
  optional int32 mumps_mem_percent = 2;
  optional double mumps_pivtol = 3;
  optional int32 ipopt_max_iter = 4;
  optional double ipopt_tol = 5;
  optional double ipopt_acceptable_constr_viol_tol = 6;
  optional double ipopt_min_hessian_perturbation = 7;
  optional double ipopt_jacobian_regularization_value = 8;
  optional string ipopt_print_timing_statistics = 9;
  optional string ipopt_alpha_for_y = 10;
  optional string ipopt_recalc_y = 11;
  optional double ipopt_mu_init = 12 [default = 0.1];
  // ipopt barrier parameter, default 0.1
}

//////////////////////////////////
// teb_pre_observation_decider_config

message TEBPreObservationDeciderConfig {
  optional bool enabled_switch = 1 [default = false];
  optional bool enabled_fsm_switch = 2 [default = false];
  optional bool enabled_rude_switch = 3 [default = false];
  optional double tar_interested_duration = 4 [default = 0.0];
}

//////////////////////////////////
// TEBRoiDeciderConfig
// to century: refine the message content
message TEBRoiDeciderConfig {
  // roi scenario definitions
  enum RoiType {
    NOT_DEFINED = 0;
    PARKING = 1;
    PULL_OVER = 2;
    PARK_AND_GO = 3;
    NARROW_STREET_U_TURN = 4;
    DEAD_END = 5;
    TRAFFIC_LIGHT = 6;
    RESCUE = 7;
    UTURN = 8;
  }
  optional RoiType roi_type = 1;
  // longitudinal range of parking roi start
  optional double roi_longitudinal_range_start = 2 [default = 10.0];
  // longitudinal range of parking roi end
  optional double roi_longitudinal_range_end = 3 [default = 10.0];
  // parking spot range detection threshold
  optional double parking_start_range = 4 [default = 7.0];
  // Parking orientation for reverse parking
  optional bool parking_inwards = 5 [default = false];
  // wrap previous gflags
  optional bool enable_perception_obstacles = 6;
  // buffer distance from vehicle's edge to parking spot end line
  optional double parking_depth_buffer = 7 [default = 0.1];
  // min angle difference to stitch a new segment in roi representation
  optional double roi_line_segment_min_angle = 8 [default = 0.15];
  optional double roi_line_segment_length = 9 [default = 1.0];
  // roi line segment length when getting road boundary from map
  optional double roi_line_segment_length_from_map = 10 [default = 10.0];
  // relative distance threshold to filter out ignored obstacle
  optional double perception_obstacle_filtering_distance = 11
      [default = 1000.0];
  // buffer distance for perception obstacle
  optional double perception_obstacle_buffer = 12;
  // crowded buffer distance for perception obstacle
  optional double crowded_perception_obstacle_buffer = 100 [default = 0.0];
  // tolerance limit for road_bound_width abnormal changes
  optional double curb_heading_tangent_change_upper_limit = 13 [default = 1.0];
  // end pose s distance to current vehicle
  optional double end_pose_s_distance = 14 [default = 10.0];
  // end pose x to parallel parking
  optional double parallel_park_end_x_buffer = 15 [default = 0.2];
  // extend right spot width size
  optional double extend_right_x_buffer = 16 [default = 0.0];
  // extend left spot width size
  optional double extend_left_x_buffer = 17 [default = 0.0];
  // longitudinal range of rescue roi
  optional double roi_longitudinal_rescue_range = 18 [default = 20.0];

  // add
  optional double goal_sample_start_s = 20 [default = 7.0];
  optional double goal_sample_end_s = 21 [default = 8.0];
  optional double goal_sample_interval_s = 22 [default = 1.5];
  optional int32 stop_long_count = 23 [default = 15];
  optional int32 replan_count = 24 [default = 7];
  optional bool enable_costmap_boundary = 25 [default = false];
  optional bool enable_select_outside_road = 26 [default = false];
  optional double park_end_replan_dis = 27 [default = 3.5];
  optional double public_end_replan_dis = 28 [default = 5.0];

  optional bool enable_frenet_boundary = 40 [default = false];
  optional int32 frenet_boundary_start_s = 41 [default = -10];
  optional int32 frenet_boundary_end_s = 42 [default = 35];
  optional double frenet_boundary_left_l = 43 [default = 2.0];
  optional double frenet_boundary_right_l = 44 [default = -2.0];

  optional int32 hd_map_boundary_start_s = 46 [default = -5];
  optional int32 hd_map_boundary_end_s = 47 [default = 20];
  optional double hd_map_boundary_dec_left_l = 48 [default = 0.2];
  optional double hd_map_boundary_dec_right_l = 49 [default = -0.2];

  optional double hd_map_boundary_start_contract_s = 50 [default = 5.0];
  optional double hd_map_boundary_left_l_contract_ratio = 51 [default = 0.5];
  optional double hd_map_boundary_right_l_contract_ratio = 52 [default = 0.2];

  optional double hd_map_boundary_play_jun_left_l_add_dis = 53 [default = 0.2];
  optional double hd_map_boundary_play_jun_right_l_add_dis = 54 [default = 0.2];

  optional bool enable_param_roi = 55 [default = false];
  optional bool enable_traffic_light_extend_current_lane_roi = 56
      [default = false];
  optional double traffic_light_extend_dis = 57 [default = 0.2];

  // not use hd map road/lane as roi boundary, just set by costmap and youself
  // This was decided by Lei Wang and YiQiang Wang
  // If you have any questions, please consult them
  // from adc to add roi lon forward distance
  optional double roi_lon_forward_distance = 30 [default = 10.0];
  // from adc to add roi lon backward distance
  optional double roi_lon_backward_distance = 31 [default = 10.0];
  // from adc to add roi lat left distance
  optional double roi_lat_left_distance = 32 [default = 10.0];
  // from adc to add roi lat right distance
  optional double roi_lat_right_distance = 33 [default = 10.0];
  // param for second try
  optional double goal_sample_start_s_second = 34 [default = 5.0];
  optional double goal_sample_end_s_second = 35 [default = 6.0];
  optional double drive_area_interpolation_step = 36 [default = 0.5];
}

//////////////////////////////////
// TEBTrajectoryPartitionConfig

message TEBTrajectoryPartitionConfig {
  // Gear shift trajectory parameter
  optional double gear_shift_max_t = 1;
  optional double gear_shift_unit_t = 2;
  optional double gear_shift_period_duration = 3;
  optional uint64 interpolated_pieces_num = 4;
  optional uint64 initial_gear_check_horizon = 5;
  // @brief heading search range is the range to filter out too large
  // angle difference between vehicle heading and pathpoint heading
  optional double heading_search_range = 6;
  // @brief heading_track_range is the range to filter out too large
  // angle difference between vehicle heading and vehicle to pathpoint vector
  optional double heading_track_range = 7;
  optional double distance_search_range = 8 [default = 1.0e-6];
  // @brief IOU, intersection over union
  optional double heading_offset_to_midpoint = 9;
  optional double lateral_offset_to_midpoint = 10 [default = 0.1];
  optional double longitudinal_offset_to_midpoint = 11 [default = 0.2];
  optional double vehicle_box_iou_threshold_to_midpoint = 12 [default = 0.95];
  optional double linear_velocity_threshold_on_ego = 13 [default = 0.1];
  // slow down the speed of the planning when near the obstacles
  optional double up_dist_threshold_on_ego = 14 [default = 1.5];
  optional double down_dist_threshold_on_ego = 15 [default = 0.1];
  optional double slow_down_min_speed = 16 [default = 0.3];
  optional double switch_trace_thr_s = 17 [default = 0.2];
  optional double switch_trace_thr_dis = 35 [default = 0.3];
  optional bool use_new_trajectory_partition = 18 [default = true];
  optional bool use_new_trajectory_speed_cal = 19 [default = true];
  optional double teb_trajectory_near_end = 20 [default = 1.0];
  optional double teb_max_speed_limit = 21 [default = 1.0];
  optional double teb_min_speed_limit = 22 [default = 0.5];
  optional double teb_min_curve_thr = 23 [default = 0.06];
  optional double teb_max_curve_thr = 24 [default = 0.26];
  optional double teb_max_curve_speed_limit = 25 [default = 1.0];
  optional double flu_up_dist_threshold_on_ego = 26 [default = 2.0];
  optional double teb_mid_speed_limit = 27 [default = 1.0];
  optional double min_dis_for_speed_limit = 28 [default = 0.5];
  optional double mid_dis_for_speed_limit = 29 [default = 1.0];
  optional double max_dis_for_speed_limit = 30 [default = 1.5];
  optional double s_step_for_speed_limit = 31 [default = 0.5];
  optional double reduction_ratio = 32 [default = 0.5];
  optional double speed_buffer = 33 [default = 0.2];
  optional double deceleration_buffer = 34 [default = 0.1];
  optional double min_start_up_lon_collision_buffer = 36 [default = 0.2];
  optional double min_start_up_lat_collision_buffer = 37 [default = 0.2];
  optional double max_start_up_lon_collision_buffer = 38 [default = 0.4];
  optional double max_start_up_lat_collision_buffer = 39 [default = 0.4];
  optional double distance_for_start_up_min_buffer = 40 [default = 3.0];
  optional double distance_for_start_up_max_buffer = 41 [default = 6.0];
  optional double switch_trace_thr_v = 42 [default = 0.2];

  optional bool enable_teb_polyfit = 60 [default = false];
  optional bool enable_precise_curvature = 61 [default = false];
}

//////////////////////////////////
// TEBTrajectoryProviderConfig

message TEBTrajectoryProviderConfig {
  optional TEBTrajectoryOptimizerConfig teb_trajectory_optimizer_config = 1;
  optional TEBTrajectoryOptimizerConfig crowded_trajectory_optimizer_config = 2;
}

message TEBTrajectoryOptimizerConfig {
  // (TODO:(QiL) tmp message during refactoring, deprecate when all tuning done.
  optional PlannerOpenSpaceConfig planner_open_space_config = 1;
  // Planner Teb Config
  optional PlannerTebConfig planner_teb_config = 2;

  // PlanGuideMode
  enum PlanGuideMode {
    ASTAR_GUIDE = 0;
    HYBIRD_ASTAR_GUIDE = 1;
    HYBIRD_ASTAR_DISTANCE_APPROACH_GUIDE = 2;
  }
  // Use A star or mixed A stars for guidance
  optional PlanGuideMode use_astar_guide = 3 [default = HYBIRD_ASTAR_GUIDE];
}

message TEBFallBackDeciderConfig {
  // prediction time horizon for prediction obstacles
  optional double open_space_prediction_time_period = 1 [default = 3.0];
  // fallback collision check distance
  optional double open_space_fallback_collision_distance = 2 [default = 5.0];
  // fallback stop trajectory safety gap to obstacles
  optional double open_space_fallback_stop_distance = 3 [default = 2.0];
  // fallback collision time buffer (s)
  optional double open_space_fallback_collision_time_buffer = 4
      [default = 10.0];
}

  optional double safe_distance_min = 28 [default = 10.0];
  optional double safe_distance_max = 29 [default = 30.0];
  optional double min_speed_for_safe_distance = 30 [default = 2.0];
  optional double faster_speed_ratio = 33 [default = 1.1];
  optional double very_faster_speed_ratio = 34 [default = 1.5];
  optional double safe_distance_ratio_for_faster_obs = 35 [default = 0.9];
  optional double safe_distance_ratio_for_very_faster_obs = 36 [default = 0.5];

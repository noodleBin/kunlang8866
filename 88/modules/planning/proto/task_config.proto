  optional double max_lane_change_preview_time_for_cubic = 20 [default = 0.0];
  optional double min_lane_change_preview_time_for_cubic = 21 [default = -1.0];
  optional double anchor_change_path_preparation_plan_time = 22 [default = 16.0];
  optional double cubic_max_dl_bound = 23 [default = 0.3];
  optional double cubic_dl_bound_weight = 24 [default = 0.2];
  optional double obstacle_start_edge_buffer_ratio = 25 [default = 0.5];
  optional double lane_change_acceleration = 26 [default = 1.5];

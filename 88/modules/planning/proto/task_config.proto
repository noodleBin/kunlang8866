  optional double reference_weight = 9 [default = 0.0];
  optional double go_down_buffer = 10 [default = 5.0];
  optional double go_up_buffer = 11 [default = 5.0];
  optional double obstacle_overtake_weight = 12 [default = 10.0];

  // obstacle cost config
  optional double default_obstacle_cost = 13 [default = 1e10];

  // speed cost config
  optional double default_speed_cost = 14 [default = 1.0];
  optional double exceed_speed_penalty = 15 [default = 10.0];
  optional double low_speed_penalty = 16 [default = 2.5];
  optional double reference_speed_penalty = 17 [default = 1.0];
  optional double keep_clear_low_speed_penalty = 18 [default = 10.0];

  // accel cost config

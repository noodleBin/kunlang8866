  optional double min_include_adc_path_bound_buffer = 35 [default = 0.0];
  optional double fix_lateral_buffer_first_level = 36 [default = 0.5];
  optional double check_head_bang_ttc = 37 [default = 3.0];
  optional int32 adc_slow_down_block_count_threshold = 38 [default = 20];
  optional double narrow_area_lat_safe_buffer = 39 [default = 0.25];
  optional double narrow_area_lon_start_safe_buffer = 40 [default = 0.5];
  optional double narrow_area_lon_end_safe_buffer = 41 [default = 0.5];
  optional double lane_borrow_use_remain_path_threshold = 42 [default = 15.0];
  optional double routing_end_reserved_distance = 43 [default = 5.0];

syntax = "proto2";

package century.planning;
import "modules/common/proto/header.proto";

enum TurnType {
  NO_TURN = 0;
  LEFT_TURN = 1;
  RIGHT_TURN = 2;
}

enum TopBullType {
  TB_NONE = 0;
  TB_WAITING = 1;
  TB_BORROW = 2;
  TB_REVERSE = 3;
}

message PathInfo {
  // coordinates
  optional double x = 1;
  optional double y = 2;
  // direction on the x-y plane
  optional double theta = 3;
}

message TopBullInfo {
  optional century.common.Header header = 1;
  // IGV Path data (a total of 16 points)
  repeated PathInfo path_info = 2;
  // IGV turn type
  optional TurnType turn_type = 3;
  // Random numbers are used for the final fallback decision
  optional uint64 random_number = 4 [default = 0];
  optional bool is_in_top_bull = 5 [default = false];
  optional TopBullType top_bull_type = 6 [default = TB_NONE];
  optional string top_bull_msg = 7 [default = ""];
}
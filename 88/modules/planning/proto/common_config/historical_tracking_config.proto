syntax = "proto2";

package century.planning.common_config;

message ScopeRangeConfig {
  optional double front_scope_dis = 1 [default = 15.0];
  optional double rear_scope_dis = 2 [default = 0.0];
  optional double left_scope_dis = 3 [default = 4.0];
  optional double right_scope_dis = 4 [default = 4.0];
}

message StartUpVehicleHistoryConfig {
  optional double max_fusion_distance = 1 [default = 0.3];
  optional ScopeRangeConfig vehicle_scope_range = 2;
  optional ScopeRangeConfig unknown_scope_range = 3;
  optional int32 max_record_times = 4 [default = 10];
  optional double large_start_up_lat_speed = 5 [default = 0.4];
  optional double small_start_up_lat_speed = 6 [default = 0.2];
  optional double large_start_up_lat_speed_for_turn_path = 7 [default = 0.8];
  optional double small_start_up_lat_speed_for_turn_path = 8 [default = 0.4];
  optional double turn_path_front_buffer = 9 [default = 60.0];
  optional double turn_path_rear_buffer = 10 [default = 60.0];
  optional double adc_turn_path_threshold = 11 [default = 60.0];
  optional double obs_turn_path_threshold = 12 [default = 60.0];
  optional double start_up_lon_speed = 13 [default = 0.5];
}

message ObstacleHeadingHistoryConfig {
  optional double left_buffer = 1 [default = 0.5];
  optional double right_buffer = 2 [default = 0.5];
  optional int32 max_record_times = 3 [default = 10];
  optional double angle_rate_threshold = 4 [default = 3.0];
  optional double cross_dis_buffer = 5 [default = 0.0];
  optional ScopeRangeConfig obstacle_scope_range = 6;
}